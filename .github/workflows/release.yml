name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  IMAGE_NAME: rundeck-exporter
  GIT_TAG: "${{ github.ref_name }}"
  GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}

jobs:
  get-version:
    runs-on: ubuntu-24.04

    steps:
      - id: get-version
        name: Get version from tag
        run: |
          VERSION=${GIT_TAG##v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    outputs:
      version: ${{ steps.get-version.outputs.version }}

  build-and-publish:
    runs-on: ubuntu-24.04
    needs: get-version

    permissions:
      contents: write
      packages: write
      id-token: write

    env:
      DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
      IMAGE_VERSION: ${{ needs.get-version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.GIT_TAG }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          activate-environment: true
          enable-cache: true

      - name: Bump version
        run: |
          uv version $IMAGE_VERSION
          uv lock

      - name: Build Python package
        run: uv build

      - name: Build Docker image
        run: make docker-build

      - name: Publish Docker image
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Push docker image:latest if no alpha, beta, or rc is set in the version tag.
          if [[ ! "$IMAGE_VERSION" =~ (alpha|beta|rc) ]]; then
            IMAGE_VERSION=latest make push-all
          fi
          make push-all

      - name: Publish to pypi.org
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4

  commit-and-tag:
    runs-on: ubuntu-24.04
    needs: [get-version, build-and-publish]

    permissions:
      contents: write

    env:
      VERSION: ${{ needs.get-version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          activate-environment: true
          enable-cache: true

      - name: Bump version in all files
        run: |
          uv version $VERSION
          uv lock
          yq -i ".appVersion = \"$VERSION\"" charts/Chart.yaml
          yq -i ".version = \"$VERSION\"" charts/Chart.yaml
          yq -i ".image.tag = \"$VERSION\"" charts/values.yaml

      - name: Commit version bump to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout main
          git pull --rebase
          git add pyproject.toml uv.lock charts/Chart.yaml charts/values.yaml
          git commit -m "Bump version to $VERSION [skip ci]" || true
          git push

  create-release:
    runs-on: ubuntu-24.04
    needs: commit-and-tag

    permissions:
      contents: write

    steps:
      - name: Create Github release
        run: |
          # release-please may have already created the release when it pushed the tag
          if gh release view "$GIT_TAG" --repo="$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release $GIT_TAG already exists, skipping"
            exit 0
          fi
          EXTRA_FLAGS="--latest"
          if [[ "$GIT_TAG" =~ (alpha|beta|rc) ]]; then
            EXTRA_FLAGS="--prerelease"
          fi
          gh release create "$GIT_TAG" \
              --repo="$GITHUB_REPOSITORY" \
              --title="$GIT_TAG" \
              --generate-notes \
              $EXTRA_FLAGS
