name: Release

on:
  push:
    tags:
      - v*

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  IMAGE_NAME: rundeck-exporter
  GIT_TAG: "${{ github.ref_name }}"
  GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}

jobs:
  get-version:
    runs-on: ubuntu-24.04

    steps:
      - id: get-version
        name: Get version from tag
        run: |
          VERSION=${GIT_TAG##v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    outputs:
      version: ${{ steps.get-version.outputs.version }}

  build-and-publish:
    runs-on: ubuntu-24.04
    needs: get-version

    permissions:
      contents: write
      packages: write

    env:
      DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
      IMAGE_VERSION: ${{ needs.get-version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.GIT_TAG }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          activate-environment: true

      - name: Bump version
        run: uv version $IMAGE_VERSION

      - name: Build Docker image
        run: make docker-build

      - name: Publish Docker image
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Push docker image:latest if no alfa or beta is set in the version tag.
          if [[ ! "$IMAGE_VERSION" =~ (alfa|beta) ]]; then
            IMAGE_VERSION=latest make push-all
          fi
          make push-all

      - name: Publish to pypi.org
        run: |
          pip install --quiet twine
          docker build --target build -t ${IMAGE_NAME}:build .
          docker run -dt --name $IMAGE_NAME --rm --entrypoint /bin/ash ${IMAGE_NAME}:build
          docker cp ${IMAGE_NAME}:/app/dist ./
          docker stop -t 0 ${IMAGE_NAME}
          twine upload --skip-existing dist/*
        env:
          TWINE_USERNAME: ${{ secrets.TWINE_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.TWINE_PASSWORD }}

  commit-and-tag:
    runs-on: ubuntu-24.04
    needs: [get-version, build-and-publish]

    permissions:
      contents: write

    env:
      VERSION: ${{ needs.get-version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          activate-environment: true

      - name: Bump version in all files
        run: |
          uv version $VERSION
          yq -i ".appVersion = \"$VERSION\"" charts/Chart.yaml
          yq -i ".version = \"$VERSION\"" charts/Chart.yaml
          yq -i ".image.tag = \"$VERSION\"" charts/values.yaml

      - name: Commit version bump to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add pyproject.toml uv.lock charts/Chart.yaml charts/values.yaml
          git commit -m "Bump version to $VERSION [skip ci]" || true
          git push

  create-release:
    runs-on: ubuntu-24.04
    needs: commit-and-tag

    permissions:
      contents: write

    steps:
      - name: Create Github release
        run: |
          gh release create "$GIT_TAG" \
              --repo="$GITHUB_REPOSITORY" \
              --title="$GIT_TAG" \
              --generate-notes \
              --latest
