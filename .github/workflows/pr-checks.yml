name: PR - Checks

on:
  pull_request:
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - 'charts/**'

concurrency:
  group: pr-checks-${{ github.head_ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ci-rundeck-exporter

jobs:
  pr-checks:
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          activate-environment: true

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run lint
        run: uv run ruff check src tests

      - name: Run type check
        run: uv run pyright src/

      - name: Build Docker Image
        run: make docker-build

      - name: Run Trivy vulnerability scanner
        env:
          TRIVY_VERSION: "0.69.3"
        run: |
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o trivy.tar.gz
          tar -xzf trivy.tar.gz trivy
          ./trivy image "${{ env.IMAGE_NAME }}"

      - name: Setup Rundeck test environment
        run: make test-env-setup

      - name: Test rundeck-exporter metrics
        run: make test

      - name: Teardown Rundeck test environment
        if: always()
        run: make test-env-teardown
