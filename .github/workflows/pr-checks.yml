name: PR - Checks

on:
  pull_request:
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - 'charts/**'

concurrency:
  group: pr-checks-${{ github.head_ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ci-rundeck-exporter

jobs:
  pr-checks:
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          activate-environment: true
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run lint
        run: uv run ruff check --output-format=github src tests

      - name: Run type check
        run: uv run pyright src/

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --junitxml=test-results/unit.xml

      - name: Build Docker Image
        run: make docker-build

      - name: Run Trivy vulnerability scanner
        env:
          TRIVY_VERSION: "0.69.3"
        run: |
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o trivy.tar.gz
          tar -xzf trivy.tar.gz trivy
          ./trivy image "${{ env.IMAGE_NAME }}"

      - name: Setup Rundeck test environment
        run: make test-env-setup

      - name: Test rundeck-exporter metrics
        run: uv run pytest --junitxml=test-results/integration.xml

      - name: Teardown Rundeck test environment
        if: always()
        run: make test-env-teardown

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: test-results/*.xml
          reporter: java-junit
