name: PR - Checks

on:
  pull_request:
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - 'charts/**'

concurrency:
  group: pr-checks-${{ github.head_ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ci-rundeck-exporter
  RD_CLI_VERSION: "2.0.9"

jobs:
  pr-checks:
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          activate-environment: true
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run lint
        run: uv run ruff check --output-format=github src tests

      - name: Run type check
        run: uv run pyright src/

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --junitxml=test-results/unit.xml

      - name: Lint Dockerfile
        run: docker run --rm -i hadolint/hadolint:v2.14.0@sha256:27086352fd5e1907ea2b934eb1023f217c5ae087992eb59fde121dce9c9ff21e < Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Docker Image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: app
          tags: ${{ env.IMAGE_NAME }}:latest
          load: true
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: table

      - name: Setup Rundeck test environment
        run: make test-env-setup

      - name: Test rundeck-exporter metrics
        run: uv run pytest --junitxml=test-results/integration.xml

      - name: Teardown Rundeck test environment
        if: always()
        run: make test-env-teardown

      - name: Publish test results
        uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc # v1
        if: always()
        with:
          name: Test Results
          path: test-results/*.xml
          reporter: java-junit
